tables:
  - name: sample_table
    uri: demo/sample_table
    format: delta
  - name: weather
    uri: demo/weather
    format: delta
  - name: invalid_uri_table
    uri: demo/invalid_uri_table
    format: delta

queries:
  - name: all_data
    title: All data
    description: Display all rows from `sample_table` and `weather` tables
    sql: |
      select
        sample_table.*,
        weather.*
      from
        sample_table,
        weather
      limit 10
  - name: daily_avg_temperature
    title: Daily average temperature
    description: Display daily average temperature values from `weather` table
    totals_row: true
    sql: |
      select
        date_trunc('day', time) as day,
        round(avg(temperature_2m)) as avg_temperature
      from
        weather
      group by
        day
      order by
        day asc
  - name: daily_avg_temperature_params
    title: Daily average temperature with parameters
    description: Display daily average temperature values from `weather` table, with dynamic filters for start and end dates
    parameters:
      start_date:
        default: "2025-01-15"
      end_date:
        default: "2025-01-31"
    sql: |
      select
        date_trunc('day', time) as day,
        round(avg(temperature_2m)) as avg_temperature
      from
        weather
      where
        day between coalesce($start_date::timestamp, timestamp '-infinity')
                and coalesce($end_date::timestamp, timestamp 'infinity')
      group by
        day
      order by
        day asc
  - name: large_query
    title: Large query
    description: Large synthetic data query with 10,000 rows and 20 columns
    sql: |
      select
        row_number() over () as id,
        'user_' || (random() * 10000)::int as username,
        ['Alice', 'Bob', 'Carol', 'Dave', 'Eve'][1 + (random() * 4)::int] as first_name,
        ['Smith', 'Jones', 'Brown', 'Taylor', 'Wilson'][1 + (random() * 4)::int] as last_name,
        (18 + (random() * 62)::int) as age,
        round(random() * 100000, 2) as salary,
        current_date - ((random() * 3650)::int) as hire_date,
        ['Engineering', 'Sales', 'HR', 'Finance', 'Marketing'][1 + (random() * 4)::int] as department,
        random() > 0.5 as is_active,
        round(random() * 5, 1) as performance_score,
        ['New York', 'London', 'Paris', 'Tokyo', 'Berlin'][1 + (random() * 4)::int] as city,
        ['US', 'UK', 'FR', 'JP', 'DE'][1 + (random() * 4)::int] as country_code,
        (random() * 50)::int as vacation_days_used,
        round(random() * 500, 2) as monthly_expenses,
        'proj_' || (random() * 100)::int as project_code,
        ['Junior', 'Mid', 'Senior', 'Lead', 'Principal'][1 + (random() * 4)::int] as seniority,
        current_date - ((random() * 365)::int) as last_review_date,
        round(random() * 10000, 2) as bonus,
        (random() * 20)::int as direct_reports,
        ['Full-time', 'Part-time', 'Contractor'][1 + (random() * 2)::int] as employment_type
      from range(10000)